<!DOCTYPE html>
<html lang="en">
<head>

<body>

<section id="sobre-nos" style="display: flex; flex-wrap: wrap; align-items: center; padding: 60px 20px; max-width: 1200px; margin: 0 auto; font-family: sans-serif; gap: 40px;">
    
    <div style="flex: 1; min-width: 300px;">
        <img src="imagens/logo.png" 
             alt="Gol Quadrado" 
             style="width: 100%; border-radius: 8px; box-shadow: 10px 10px 0px #e31d1d; filter: grayscale(20%);">
    </div>
<div>
    <style>
                body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #3b3b3b 0%, #000000 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        nav{
            text-align: left;
        }

        nav a {
    color: #ffffff;
    font-size: 16px;
    text-decoration: none;
    font-weight: 600;
    transition: all 0.3s ease;
    padding: 8px 15px;
    border-radius: 5px;
}

        
    </style>
</div>

    <div style="flex: 1; min-width: 300px;">
        <h2 style="font-size: 2.5rem; color: #ffffff; margin-bottom: 20px; text-transform: uppercase; font-weight: 800;">
            O SISTEMA <span style="color: #e31d1d;">DE LOGIN</span>
        </h2>
        
        <p style="font-size: 1.1rem; line-height: 1.6; color: #ffffff; margin-bottom: 15px;">
            ESTÁ EM DESENVOLVIMENTO
        </p>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <div style="border-left: 4px solid #e31d1d; padding-left: 10px;">
                <strong style="display: block; font-size: 1.2rem; color: #e31d1d;">Projetos</strong>
                <span style="color: #ffffff;">Restauração e Performance</span>
            </div>
            <div style="border-left: 4px solid #e31d1d; padding-left: 10px;">
                <strong style="display: block; font-size: 1.2rem; color: #e31d1d;">Foco</strong>
                <span style="color: #ffffff;">Linha Volkswagen Quadrada</span>
            </div>
        </div>
    </div>
</section>
