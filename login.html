<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Família do Gol Quadrado</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #3b3b3b 0%, #000000 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-container {
            background: rgb(171, 171, 171);
            padding: 50px;
            border: 3px solid #000000;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
            width: 100%;
            max-width: 420px;
        }

        .login-container h1 {
            text-align: center;
            color: #1a1a1a;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .login-container p {
            text-align: center;
            color: #444;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            color: #1a1a1a;
            font-weight: 700;
            font-size: 15px;
            letter-spacing: 0.5px;
        }

        input[type="text"],
        input[type="password"],
        input[type="email"] {
            width: 100%;
            padding: 14px;
            border: 2px solid #000000;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.9);
        }

        input[type="text"]:focus,
        input[type="password"]:focus,
        input[type="email"]:focus {
            outline: none;
            border-color: #e30613;
            box-shadow: 0 0 10px rgba(227, 6, 19, 0.4);
            background: white;
        }

        input[type="text"]::placeholder,
        input[type="password"]::placeholder,
        input[type="email"]::placeholder {
            color: #999;
        }

        .form-buttons {
            display: flex;
            gap: 12px;
            margin-top: 30px;
        }

        input[type="submit"],
        .btn-registrar {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            text-align: center;
            display: inline-block;
        }

        input[type="submit"] {
            background: linear-gradient(135deg, #3b3b3b 0%, #000000 100%);
            color: white;
        }

        input[type="submit"]:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.5);
        }

        .btn-registrar {
            background: #e30613;
            color: white;
            text-decoration: none;
        }

        .btn-registrar:hover {
            background: #b80410;
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(227, 6, 19, 0.4);
        }

        .toggle-form {
            text-align: center;
            margin-top: 20px;
            color: #333;
            font-size: 14px;
        }

        .toggle-form button {
            background: none;
            border: none;
            color: #e30613;
            font-weight: 700;
            cursor: pointer;
            text-decoration: underline;
        }

        .toggle-form button:hover {
            color: #b80410;
        }

        .error {
            color: #d9534f;
            font-size: 13px;
            margin-top: 5px;
            display: none;
        }

        .success {
            color: #5cb85c;
            font-size: 13px;
            margin-top: 5px;
            display: none;
        }

        #registerForm {
            display: none;
        }

        .voltar {
            display: inline-block;
            margin-top: 20px;
            color: #e30613;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
        }

        .voltar:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <!-- FORM LOGIN -->
        <form id="loginForm">
            <h1>Bem-vindo</h1>
            <p>Acesse sua conta</p>

            <div class="form-group">
                <label for="loginNome">Nome de Usuário</label>
                <input type="text" id="loginNome" name="nome" placeholder="Digite seu nome" required>
                <div class="error" id="errorLoginNome"></div>
            </div>

            <div class="form-group">
                <label for="loginSenha">Senha</label>
                <input type="password" id="loginSenha" name="senha" placeholder="Digite sua senha" required>
                <div class="error" id="errorLoginSenha"></div>
            </div>

            <div class="error" id="errorLogin"></div>

            <div class="form-buttons">
                <input type="submit" value="Entrar">
                <button type="button" class="btn-registrar" onclick="toggleForm()">Criar Conta</button>
            </div>

            <div class="toggle-form">
                Não tem conta? <button type="button" onclick="toggleForm()">Registre-se</button>
            </div>
        </form>

        <form id="registerForm">
            <h1>Criar Conta</h1>
            <p>Junte-se à nossa comunidade</p>

            <div class="form-group">
                <label for="regNome">Nome Completo</label>
                <input type="text" id="regNome" name="nome" placeholder="Digite seu nome completo" required>
                <div class="error" id="errorRegNome"></div>
            </div>

            <div class="form-group">
                <label for="regEmail">E-mail</label>
                <input type="email" id="regEmail" name="email" placeholder="seu@email.com" required>
                <div class="error" id="errorRegEmail"></div>
            </div>

            <div class="form-group">
                <label for="regSenha">Senha</label>
                <input type="password" id="regSenha" name="senha" placeholder="Mínimo 6 caracteres" required>
                <div class="error" id="errorRegSenha"></div>
            </div>

            <div class="form-group">
                <label for="regConfirmSenha">Confirmar Senha</label>
                <input type="password" id="regConfirmSenha" name="confirmSenha" placeholder="Confirme sua senha" required>
                <div class="error" id="errorRegConfirmSenha"></div>
            </div>

            <div class="success" id="successReg"></div>
            <div class="error" id="errorReg"></div>

            <div class="form-buttons">
                <input type="submit" value="Registrar">
                <button type="button" class="btn-registrar" onclick="toggleForm()">Voltar</button>
            </div>

            <div class="toggle-form">
                Já tem conta? <button type="button" onclick="toggleForm()">Faça login</button>
            </div>
        </form>

        <a href="index.html" class="voltar">← Voltar para Home</a>
    </div>

    <script src="auth.js"></script>
</body>
</html>
